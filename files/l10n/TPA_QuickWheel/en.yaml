# ---- Main Settings ----
PageName: Quick Wheel
PageDesc: |-
  Quick Wheel for fast and smart use of potions, spells and magic items.
  Version: 1.1.0

SettingResetKeyBinds: Reset keybinds
SettingResetKeyBindsDesc: |-
  Removes all keybinds for all types of wheels.

SettingsName: Main Settings
SettingKeyOmniWheel: Button to open Omni Wheel
SettingKeyOmniWheelDesc: Opens the wheel that contains all potions, spells and magic items.
SettingKeyPotionWheel: Button to open Potion Wheel
SettingKeyPotionWheelDesc: Opens the wheel that contains all potions.
SettingKeyMagicWheel: Button to open Magic Wheel
SettingKeyMagicWheelDesc: Opens the wheel that contains all spells and magic items.
SettingKeyOmniWheelAlt: Alternate button to open Omni Wheel
SettingKeyPotionWheelAlt: Alternate button to open Potion Wheel
SettingKeyMagicWheelAlt: Alternate button to open Magic Wheel
SettingKeyMode: Key mode
SettingKeyModeDesc: |-
  Smart - tap to toggle wheel or hold to close on key release. 
  Hold - hold to open, close on key release. 
  Toggle - tap to toggle wheel.

SettingKeyModeSmart: Smart
SettingKeyModeHold: Hold
SettingKeyModeToggle: Toggle

SettingTimeMode: Wheel time slowdown
SettingTimeModeDesc: How slow should time get while the wheel is open.

SettingTimeModeNormal: Normal
SettingTimeModeSlow: Slow
SettingTimeModeVerySlow: Very Slow
SettingTimeModePaused: Paused

SettingExclusiveController: Controller exclusive mode
SettingExclusiveControllerDesc: |-
  If turned on there will be no cursor when opening the wheels. Time will be paused regardless of the slowdown settings.
  Use left stick to select items.
  Use triggers instead of SHIFT, CTRL and ALT to access extra functions:
  - Left Trigger replaces SHIFT
  - Right Trigger replaces CTRL
  - Left+Right Triggers repaces ALT
  
  Note: controller works even without turning this on, but it may be clunky if Wheel time slowdown is not at Paused or Normal.

SettingControllerStick: Selection method for controller
SettingControllerStickDesc: Controller input that is used to select items.
ControllerStickLeft: Left Stick
ControllerStickRight: Right Stick

# ---- Potion Settings ----
SettingsPotionsName: Potion Settings

SettingNoUnknownCategory: Ignore unknown effects
SettingNoUnknownCategoryDesc: If turned on, unknown effects will not be checked when filtering potions into categories.

SettingFilterPoisons: Toxicology! Poison Filter
SettingFilterPoisonsDesc: Only poisons that Toxicology! mod recognizes will be in poisons category. If Toxicology! is not present does nothing.

SettingQuickApplyPoison: Toxicology! Quick Apply Poison
SettingQuickApplyPoisonDesc: If Toxicology! is installed holding Shift will apply poison without a prompt.

SettingSeparateAlcohol: Separate Alcoholic Drinks
SettingSeparateAlcoholDesc: |-
  If Toxicology! is installed, change how alcohol is categorized:
  None - alcohol is categorized as any other potion.
  Show - alcohol is also shown in Other category.
  Move - alcohol is shown ONLY in Other category.

SettingAlcoholModeNormal: None
SettingAlcoholModeShow: Show
SettingAlcoholModeMove: Move

# ---- Magic Settings ----
SettingsMagicName: Magic Settings
SettingsMagicNameDesc: |-
  Hold ALT to just equip spell without readying.

  Hold CTRL to cast spell without equipping.
  Requires Spell Framework.

  Hold SHIFT to queue spell to be cast without equipping or closing the wheel.
  Requires Spell Framework.


SettingMagicClickMode: Magic Default Action
SettingMagicClickModeDesc: |-
  What should happen when you click on a spell or magic item?

  Ready - spell is equipped and magic stance readied, wheel closes.

  Equip - spell is equipped, but not readied.
  ALT-click readies spell.

  Cast - spell is cast, wheel is closed.
  CTRL readies spell.
  Requires Spell Framework.

  Queue - spell is queued to be cast, wheel is not closed, can click on other spells to queue them.
  SHIFT readies spell.
  Requires Spell Framework.

SettingMagicUseOSSC: Use OSSC to quick cast
SettingMagicUseOSSCDesc: If Oblivion Style Spell Casting is installed, it will be used to quick cast magic.

SettingMagicClickModeReady: Ready
SettingMagicClickModeEquip: Equip
SettingMagicClickModeQCast: Cast
SettingMagicClickModeQueue: Queue

SettingMagicCastDelay: Magic Cast Delay
SettingMagicCastDelayDesc: |-
  Seconds before magic is cast after clicking on it. 
  Applies when not using OSSC to cast. 
  Range [0.1 - 2].

SettingMagicCastCooldown: Magic Cast Cooldown
SettingMagicCastCooldownDesc: |-
  Seconds after magic is cast. Added on top of delay for queued spells.
  Applies when not using OSSC to cast.
  Range [0.2 - 2].

SettingMagicShowQueue: Show Queued Spells
SettingMagicShowQueueDesc: Show a list of currently queued spells.
SettingMagicQueueWidgetPosition:  Spell Queue Position

QueueWidgetPositionBottomLeft: " Bottom Left "
QueueWidgetPositionBottomRight: "Bottom Right"
QueueWidgetPositionCenter: "   Center   "
QueueWidgetPositionTopLeft: "  Top Left  "
QueueWidgetPositionTopRight: " Top Right  "

# ---- Potion Categories ----
Potion_Category_Title_Health: Healing
Potion_Category_Desc_Health: |-
  All health restoring potions.
  Hold SHIFT to consume first potion.
Potion_Category_Title_Stamina: Fatigue
Potion_Category_Desc_Stamina: |-
  All fatigue restoring potions.
  Hold SHIFT to consume first potion.
Potion_Category_Title_Magicka: Magicka
Potion_Category_Desc_Magicka: |-
  All magicka restoring potions.
  Hold SHIFT to consume first potion.
Potion_Category_Title_Combat: Combat
Potion_Category_Desc_Combat: |-
  Potions that grant elemental resistances and shields.
  Or provide spell resistance, reflection or absorption.
Potion_Category_Title_Cure: Cures
Potion_Category_Desc_Cure: |-
  Potions that cure poisons, paralyzation and diseases 
  or restore attributes.
Potion_Category_Title_Poison: Poisons
Potion_Category_Desc_Poison: Potions with negative effects.
Potion_Category_Title_Buffs: Buffs
Potion_Category_Desc_Buffs: |-
  Potions that provide attribute or skill bonuses
  or grant other positive effects like feather, levitate etc.
Potion_Category_Title_Other: Other
Potion_Category_Desc_Other: Potions that didn't fit into any other category.

# ---- Magic Categories ----
Magic_Category_Title_Damage: Damage
Magic_Category_Desc_Damage: |-
  Magic that deals damage.

Magic_Category_Title_Combat: Combat
